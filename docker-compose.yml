version: '3.8'

services:
  # ============================================
  # ПРИЛОЖЕНИЕ (эта часть дана готовой)
  # ============================================

  msr-db:
    container_name: msr-db
    image: postgres:13-alpine
    env_file:
      - .env
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d my-shows-rating"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - test-network

  msr-backend:
    container_name: msr-backend
    image: gitlab.qa.studio:5050/manual-qa/my-shows-rating/backend:v1.0.0
    env_file:
      - .env
    ports:
      - "${PORT}:${PORT}"
    depends_on:
      msr-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${PORT}/api/v1/series"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - test-network

  # ============================================
  # ТЕСТЫ (добавлено QA)
  # ============================================

  api-tests:
    container_name: msr-api-tests
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      msr-backend:
        condition: service_healthy
    environment:
      # Подключение к API внутри Docker-сети
      API_BASE_URL: http://msr-backend:8000/api/v1
      # Подключение к БД внутри Docker-сети
      POSTGRES_DB: my-shows-rating
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "123456"
      POSTGRES_HOST: msr-db
      POSTGRES_PORT: "5432"
    networks:
      - test-network

networks:
  test-network:
    driver: bridge
