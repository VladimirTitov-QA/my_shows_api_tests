type: array
items:
    type: object
    additionalProperties: false
    properties:
        id:
            type: integer
        name:
            type: string
        photo:
            type:
                - string
                - "null"
        rating:
            type:
                - integer
                - "null"
        status:
            type: string
            enum:
                - "watching"
                - "watched"
                - "will_watch"
        review:
            type:
                - string
                - "null"
    required:
        - id
        - name
        - status